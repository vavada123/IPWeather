<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vremenska Napoved</title>
    <style>
        /* Osnovne nastavitve za ozadje */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }

        /* Kartica za prikaz podatkov */
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .location {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }

        .temp {
            font-size: 4rem;
            font-weight: 800;
            margin: 1rem 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .ip-address {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 1.5rem;
            font-family: monospace;
        }

        /* Dodatek simbola za stopinje */
        .temp::after {
            content: "°C";
            font-size: 1.5rem;
            vertical-align: top;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="weather-card">
        <h1>Trenutno vreme</h1>
        <div class="location">{{ kraj }}</div>
        <div class="temp">{{ temperatura }}</div>
        
        <div class="ip-address">
            IP: {{ ip }}
        </div>
    </div>

</body>
</html>
